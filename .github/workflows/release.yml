name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            sep: ";"
            platform: "win64"
            ext: ".exe"
            icon: '--icon="static/logo.ico"'
          - os: macos-latest
            sep: ":"
            platform: "macos"
            ext: ""
            icon: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Binary with PyInstaller
        shell: bash
        run: |
          # Build Full Version (with local OCR)
          pyinstaller --onefile --add-data "static${{ matrix.sep }}static" --add-data "index.html${{ matrix.sep }}." ${{ matrix.icon }} server.py -n OmniExtract-full-${{ matrix.platform }}${{ matrix.ext }}

          # Build Lite Version (without local OCR)
          pyinstaller --onefile --add-data "static${{ matrix.sep }}static" --add-data "index.html${{ matrix.sep }}." ${{ matrix.icon }} --exclude-module rapidocr_onnxruntime --exclude-module onnxruntime --exclude-module cv2 server.py -n OmniExtract-lite-${{ matrix.platform }}${{ matrix.ext }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: dist/OmniExtract-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten directory structure
        run: |
          mkdir -p dist
          find dist-all -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
