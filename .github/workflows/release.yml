name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          # Build Full Version (with local OCR)
          pyinstaller --onefile --add-data "static;static" --add-data "index.html;." --icon="static/logo.ico" server.py -n OmniExtract-full

          # Build Lite Version (without local OCR, excluding onnxruntime and cv2)
          pyinstaller --onefile --add-data "static;static" --add-data "index.html;." --icon="static/logo.ico" --exclude-module rapidocr_onnxruntime --exclude-module onnxruntime --exclude-module cv2 server.py -n OmniExtract-lite

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/OmniExtract-full.exe
            dist/OmniExtract-lite.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
